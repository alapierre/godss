name: GitHub Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build artifacts
        run: |
          mkdir -p dist
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-w -s -X github.com/alapierre/godss/version.Version=${VERSION}"
          cd cmd/godss
          CGO_ENABLED=0 go build -trimpath -ldflags="$LDFLAGS" -o ../../dist/godss .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # 2.5.0
        with:
          generate_release_notes: true
          files: |
            dist/godss
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}